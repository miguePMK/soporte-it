<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de almacenamiento · Petromark SRL</title>
  <link rel="icon" type="image/png" href="../../assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --brand:#2C7EA0; --brand-bright:#4DA9CE; --accent-soft:rgba(77,169,206,.12);
      --bg:#F3F5F7; --surface:#FFFFFF; --border:#D2D9DF;
      --ink:#16222C; --text:#33424E; --muted:#6B7A85;
      --sans:"Inter",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.55}
    .top{background:var(--surface);border-bottom:1px solid var(--border)}
    .top .in{max-width:640px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;gap:12px}
    .top img{width:30px;height:30px;border-radius:6px}
    .top b{color:var(--ink);letter-spacing:.12em;text-transform:uppercase;font-size:.95rem}
    .accent{height:3px;background:var(--brand-bright)}
    .back{margin-left:auto;font:500 .82rem var(--sans);color:var(--brand);text-decoration:none}
    .back:hover{text-decoration:underline}
    main{max-width:640px;margin:0 auto;padding:40px 24px}
    h1{color:var(--ink);font-size:1.5rem;margin:0 0 6px}
    .lead{color:var(--muted);margin:0 0 28px;font-size:.95rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px}
    label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    input,select{height:46px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font:500 1rem var(--sans);padding:0 14px}
    input{flex:1;min-width:140px;font-family:var(--mono)}
    input:focus,select:focus{outline:none;border-color:var(--brand-bright);box-shadow:0 0 0 3px var(--accent-soft)}
    .out{margin-top:24px;border-top:1px solid var(--border);padding-top:20px}
    .out h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 12px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .cell{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
    .cell .u{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .cell .v{font-family:var(--mono);font-size:1.05rem;color:var(--ink);margin-top:2px;word-break:break-all}
    @media(max-width:520px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="top">
    <div class="in">
      <img src="../../assets/logo.png" alt="" />
      <b>Petromark SRL</b>
      <a class="back" href="../../index.html">← Volver al catálogo</a>
    </div>
  </header>
  <div class="accent"></div>

  <main>
    <h1>Conversor de almacenamiento</h1>
    <p class="lead">Ingresá un valor y su unidad para verlo convertido a todas las demás (base 1024).</p>

    <div class="card">
      <div class="row">
        <div style="flex:1;min-width:160px">
          <label for="val">Valor</label>
          <input id="val" type="number" value="1" min="0" step="any" inputmode="decimal" />
        </div>
        <div>
          <label for="unit">Unidad</label>
          <select id="unit">
            <option value="0">Bytes</option>
            <option value="1">KB</option>
            <option value="2" selected>MB</option>
            <option value="3">GB</option>
            <option value="4">TB</option>
          </select>
        </div>
      </div>

      <div class="out">
        <h2>Equivalencias</h2>
        <div class="grid" id="grid"></div>
      </div>
    </div>
  </main>

  <script>
    const UNITS = ["Bytes","KB","MB","GB","TB"];
    const val = document.getElementById("val");
    const unit = document.getElementById("unit");
    const grid = document.getElementById("grid");

	function fmt(n){
	  if(!isFinite(n)) return "—";

	  if (Number.isInteger(n)) {
		return n.toLocaleString("es-AR");
	  }

	  return n.toLocaleString("es-AR", {
		maximumFractionDigits: 12
	  }).replace(/,?0+$/, "");
	}
    function render(){
      const v = parseFloat(val.value);
      const base = isNaN(v) ? 0 : v * Math.pow(1024, parseInt(unit.value,10));
      grid.innerHTML = UNITS.map((u,i)=>
        '<div class="cell"><div class="u">'+u+'</div><div class="v">'+fmt(base/Math.pow(1024,i))+'</div></div>'
      ).join("");
    }
    val.addEventListener("input", render);
    unit.addEventListener("change", render);
    render();
  </script>
</body>
</html>
